<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratchpad</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%230d6efd'%3E%3C/rect%3E%3Cpath d='M30 50 L70 50 M30 65 L70 65 M30 35 L55 35' stroke='%23fff' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <nav class="navbar bg-body-tertiary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-journal-richtext"></i>
                Scratchpad
            </a>
            <div class="dropdown">
                <button class="btn nav-link dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-sun-fill theme-icon-active" data-theme-icon-active="bi-sun-fill"></i>
                    <span class="d-none d-sm-inline">Theme</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="light"><i class="bi bi-sun-fill me-2"></i> Light</button></li>
                    <li><button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="dark"><i class="bi bi-moon-stars-fill me-2"></i> Dark</button></li>
                    <li><button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="auto"><i class="bi bi-circle-half me-2"></i> System</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div id="notes-list-panel">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">My Notes</h5>
                        <div class="btn-toolbar">
                            <button id="new-note-btn" class="btn btn-sm btn-primary me-2">
                                <i class="bi bi-plus-lg"></i>
                                <span class="d-none d-sm-inline"> New Note</span>
                            </button>
                             <button class="btn btn-sm btn-outline-secondary me-2" type="button" data-bs-toggle="collapse" data-bs-target="#collapsible-note-list" aria-expanded="true" aria-controls="collapsible-note-list" id="toggle-list-btn" title="Collapse list">
                                <i class="bi bi-chevron-up"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <input type="text" id="search-input" class="form-control" placeholder="Search notes...">
                    </div>

                    <div class="collapse show" id="collapsible-note-list">
                        <ul id="note-list" class="list-group">
                            <!-- Notes are rendered here by JavaScript -->
                        </ul>
                         <p id="empty-list-message" class="text-center text-muted mt-4 d-none">The list is empty. Add a new note!</p>
                    </div>

                    <div class="d-flex justify-content-end mt-3">
                        <button id="delete-all-btn" class="btn btn-sm btn-danger">
                            <i class="bi bi-trash-fill"></i>
                            <span class="d-none d-sm-inline"> Delete All</span>
                        </button>
                    </div>
                </div>

                <div id="editor-panel" class="card mt-4 d-none">
                    <div class="card-header pb-0 d-flex align-items-end justify-content-between gap-2">
                        <ul class="nav nav-tabs card-header-tabs d-none" id="open-notes-tabs" role="tablist"></ul>
                        <h6 id="active-note-label" class="mb-2 text-muted">Editing note</h6>
                        <button id="active-note-close-btn" class="btn btn-sm btn-link text-muted mb-2 d-none" type="button" title="Close note">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <div class="card-body">
                        <form id="note-form">
                            <div class="mb-3">
                                <label for="note-title-input" class="form-label">Title</label>
                                <input type="text" id="note-title-input" class="form-control" placeholder="Give your note a title">
                            </div>
                            <div class="mb-3">
                                <label for="note-content-input" class="form-label">Note</label>
                                <textarea id="note-content-input" class="form-control" rows="8" placeholder="Write your content here..."></textarea>
                            </div>
                            <div class="d-flex align-items-center gap-3">
                                <button id="save-note-btn" class="btn btn-primary" type="submit"><i class="bi bi-save-fill me-2"></i>Save Now</button>
                                <small id="autosave-status" class="text-muted">Autosave: idle</small>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="assets/js/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
